# Claude Code Workflow Tmux Configuration
# Source the base config first
source-file ~/.tmux.conf

# ----------------------------------------------------------------------
# | Claude Code Session Settings                                      |
# ----------------------------------------------------------------------

# Start with 4-pane layout by default
# This will be handled by the launcher script

# Enhanced status bar for monitoring multiple instances
set -g status-left-length 40
set -g status-left " Claude Monitor | Session: #S | "
set -g status-right " Panes: #{window_panes} | %H:%M %d-%b "

# Different color scheme for Claude sessions
set -g status-style fg=white,bg=blue
set -g window-status-style fg=white,bg=blue,dim 
set -g window-status-current-style fg=blue,bg=white,bright

# More visible active pane border
set -g pane-active-border-style fg=blue,bg=default
set -g pane-border-style fg=colour240,bg=default

# ----------------------------------------------------------------------
# | Claude Workflow Key Bindings                                      |
# ----------------------------------------------------------------------

# Function to display help from file - discovers script directory dynamically
bind h run-shell 'CLAUDE_DIR="$(dirname "$(find ~/.dotfiles ~/Personal/dotfiles -name "tmux-claude.conf" 2>/dev/null | head -1)")"; if [ -f "$CLAUDE_DIR/claude-help.txt" ]; then cat "$CLAUDE_DIR/claude-help.txt"; else echo "🤖 Claude help file not found. Expected at: $CLAUDE_DIR/claude-help.txt"; fi'

# [ PREFIX + c ] Create new pane with Claude ready prompt
bind c split-window -h \; display-message "🤖 New pane created! Press Prefix + h for help"

# [ PREFIX + C ] Create new window with 4-pane Claude layout
bind C new-window \; split-window -h \; split-window -v \; select-pane -t 0 \; split-window -v \; select-pane -t 0 \; display-message "🤖 4-pane layout created! Press Prefix + h for help"

# [ PREFIX + m ] Move current pane to new window
bind m break-pane \; display "Pane moved to new window"

# [ PREFIX + j ] Join pane from another window (prompts for window:pane)
bind-key j command-prompt -p "Join pane from (window.pane):" "join-pane -s '%%'"

# [ PREFIX + s ] Send pane to another window (prompts for window)
bind-key s command-prompt -p "Send pane to window:" "join-pane -t '%%'"

# [ PREFIX + = ] Arrange panes in 4-quadrant layout
bind = select-layout tiled \; display "Tiled layout applied"

# [ PREFIX + g ] Arrange panes in grid layout (2x2)
bind g select-layout even-horizontal \; select-layout even-vertical \; display "Grid layout applied"

# [ PREFIX + | ] Split window vertically (new pane on right)
bind | split-window -h \; display-message "🤖 Vertical split created! Press Prefix + h for help"

# [ PREFIX + - ] Split window horizontally (new pane below)  
bind - split-window -v \; display-message "🤖 Horizontal split created! Press Prefix + h for help"

# [ PREFIX + n ] Create new Claude instance in current pane
bind n send-keys 'claude' C-m

# [ PREFIX + q ] Quick pane selection with numbers (enhanced display time)
bind q display-panes -d 2000

# [ PREFIX + w ] Window selection with preview
bind w choose-window -F "#{window_index}: #{window_name} (#{window_panes} panes)"

# ----------------------------------------------------------------------
# | Session Management                                                 |
# ----------------------------------------------------------------------

# [ PREFIX + S ] Save session layout (requires tmux-resurrect plugin)
# bind S run-shell "tmux list-sessions > ~/.tmux-claude-sessions"

# Set session name for easier identification
set -g set-titles on
set -g set-titles-string "Claude Monitor: #S"